<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kita</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;700&display=swap');
  body { margin:0; overflow:hidden; background:#000; font-family:'Poppins', sans-serif; }
  #scene { position:absolute; bottom:8%; left:50%; transform:translateX(-50%); width:90%; max-width:600px; text-align:center; background:rgba(0,0,0,0.7); backdrop-filter:blur(10px); padding:18px; border-radius:12px; z-index:2; opacity:0; transition:opacity 2s ease-in-out; border:1px solid rgba(167,139,250,0.3); }
  #scene.show { opacity:1; }
  h1 { font-size:20px; margin:0 0 6px 0; color:#fff; }
  p { font-size:14px; line-height:1.7; font-weight:300; margin:0; color:#ddd; }
  #pesan { font-size:15px; font-style:italic; color:#a78bfa; text-align:left; }
  #progress { position:absolute; bottom:0; left:0; height:3px; background:#a78bfa; z-index:3; width:0%; transition:width 0.1s linear; }
  #startHint { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10; background:#000; padding:20px; border-radius:12px; border:1px solid #a78bfa; color:#fff; font-weight:700; }
  #musicBtn { position:absolute; top:15px; right:15px; z-index:5; background:rgba(255,255,255,0.1); border:1px solid #fff; color:#fff; width:40px; height:40px; border-radius:50%; }
</style>
<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
<div id="startHint">Tap Untuk Putar Film ✨</div>
<div id="scene"><div id="text"></div></div>
<button id="musicBtn" onclick="toggleMusic()">🔊</button>
<div id="progress"></div>

<script type="module">
import * as THREE from 'three';

const scenes=[
 {t:"Bab 1: Kita Berempat",p:"Dulu, semuanya berawal dari kita berempat.",anim:"4", dur:8},
 {t:"Bab 2: Makin Rame",p:"Satu-satu orang baru datang. Lingkaran kita makin besar.",anim:"12", dur:10},
 {t:"Bab 3: Suka & Duka",p:"Kita jatuh bareng, bangkit bareng. Ada hujan, ada tawa.",anim:"rain", dur:12},
 {t:"Bab 4: Berpencar",p:"Sampai akhirnya... kita harus jalan masing-masing.",anim:"scatter", dur:10},
 {t:"Bab Terakhir: Untuk Kalian",p:`<div id="pesan">"Hai kalian... Mungkin sekarang kita udah gak serame dulu.<br><br>Tapi aku harap kalian gak pernah lupa. Masa dimana kita selalu jadi tempat pulang.<br><br>Semangat terus ya. Buat mimpi, buat cinta. Aku bangga sama kita.<br><br>- Dari kamar kos, jam 1 pagi."</div>`,anim:"sit", dur:20}
];
let i=0, timer;
const sceneEl=document.getElementById('scene'),textEl=document.getElementById('text'),startHint=document.getElementById('startHint'),progressEl=document.getElementById('progress');

function playScene(){
 sceneEl.classList.remove('show');
 setTimeout(()=>{
  textEl.innerHTML=`<h1>${scenes[i].t}</h1><p>${scenes[i].p}</p>`;
  sceneEl.classList.add('show');
  setAnim(scenes[i].anim);
  let start=Date.now();
  clearInterval(timer);
  timer=setInterval(()=>{
    let p=(Date.now()-start)/(scenes[i].dur*1000)*100;
    progressEl.style.width=p+'%';
    if(p>=100){clearInterval(timer);nextScene();}
  },100);
 },1000);
}
function nextScene(){if(i<scenes.length-1){i++;playScene();}else{progressEl.style.width='100%';}}
document.body.addEventListener('click',()=>{if(startHint.style.display!=='none'){initMusic();music=1;startHint.style.display='none';playScene();}}, {once:1});

// ===== 3D CHIBI 100% KODE =====
const W=innerWidth,H=innerHeight;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x0a0a1a);
const camera=new THREE.PerspectiveCamera(75,W/H,0.1,1000);camera.position.set(0,3,12);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(W,H);document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff,0.7));
const light=new THREE.PointLight(0xa78bfa,1.5,30);light.position.set(0,5,5);scene.add(light);

const coreColors=[0xff4d6d,0x3b82f6,0xfacc15,0x34d399];
function createChibi(color=0xa78bfa){
 const mat=new THREE.MeshStandardMaterial({color:color, roughness:0.6});
 const g=new THREE.Group();
 g.add(new THREE.Mesh(new THREE.SphereGeometry(0.4,16,16),mat).translateY(1.7)); // Kepala
 g.add(new THREE.Mesh(new THREE.BoxGeometry(0.6,0.7,0.4),mat).translateY(0.9)); // Badan
 g.add(new THREE.Mesh(new THREE.BoxGeometry(0.2,0.5,0.2),mat).translateY(0.9).translateX(-0.5)); // Lengan
 g.add(new THREE.Mesh(new THREE.BoxGeometry(0.2,0.5,0.2),mat).translateY(0.9).translateX(0.5));
 g.add(new THREE.Mesh(new THREE.BoxGeometry(0.25,0.6,0.25),mat).translateY(0.2).translateX(-0.2)); // Kaki
 g.add(new THREE.Mesh(new THREE.BoxGeometry(0.25,0.6,0.25),mat).translateY(0.2).translateX(0.2));
 return g;
}

let humans=[],rains=[],bed;
function setAnim(type){
 humans.forEach(h=>scene.remove(h));humans=[];rains.forEach(r=>scene.remove(r));rains=[];if(bed)scene.remove(bed);
 if(type==="4"){for(let j=0;j<4;j++){let h=createChibi(coreColors[j]);h.position.set(j*2-3,0,0);h.userData={state:'idle',i:j};humans.push(h);scene.add(h);}}
 if(type==="12"){for(let j=0;j<12;j++){let h=createChibi(j<4?coreColors[j]:0xa78bfa);h.position.set((Math.random()-0.5)*12,0,(Math.random()-0.5)*4);h.userData={state:'dance'};humans.push(h);scene.add(h);}}
 if(type==="rain"){for(let j=0;j<8;j++){let h=createChibi(j<4?coreColors[j]:0xa78bfa);h.position.set(j*2-7,0,0);h.userData={state:'sad'};humans.push(h);scene.add(h);}for(let j=0;j<150;j++){let r=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,1.5,6),new THREE.MeshBasicMaterial({color:0xffffff,transparent:1,opacity:0.3}));r.position.set((Math.random()-0.5)*20,Math.random()*8+4,(Math.random()-0.5)*5);r.userData={v:0.15};rains.push(r);scene.add(r);}}
 if(type==="scatter"){for(let j=0;j<12;j++){let h=createChibi(j<4?coreColors[j]:0xa78bfa);h.position.set(0,0,0);h.userData={v:new THREE.Vector3((Math.random()-0.5)*0.1,0,(Math.random()-0.5)*0.1),state:'walk'};humans.push(h);scene.add(h);}}
 if(type==="sit"){
  bed=new THREE.Mesh(new THREE.BoxGeometry(4,0.4,2.5),new THREE.MeshStandardMaterial({color:0x222}));bed.position.y=0.2;scene.add(bed);
  let h=createChibi(coreColors[0]);h.scale.set(1.2,1.2,1.2);h.rotation.z=Math.PI/2;h.position.set(0,0.8,0.5);humans.push(h);scene.add(h);
 }
}

function animate(){
 requestAnimationFrame(animate);
 humans.forEach(h=>{
  if(h.userData.state==='idle')h.position.y=Math.abs(Math.sin(Date.now()/600+h.userData.i))*0.05;
  if(h.userData.state==='dance')h.rotation.y+=0.04;
  if(h.userData.state==='sad')h.rotation.z=-0.25;
  if(h.userData.state==='walk')h.position.add(h.userData.v);
 });
 rains.forEach(r=>{r.position.y-=r.userData.v;if(r.position.y<-1)r.position.y=8;});
 camera.lookAt(0,1,0);
 renderer.render(scene,camera);
}
animate();

// Musik
let ac,music=0,intv;
function initMusic(){ac=new(window.AudioContext||window.webkitAudioContext)();const m=[392,440,494,523,494,440,392,349];let k=0;intv=setInterval(()=>{if(music){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=m[k];g.gain.setValueAtTime(0.02,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.5);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+0.5);k=(k+1)%m.length;}},600);}
window.toggleMusic=()=>{if(!ac)initMusic();music=!music;document.getElementById('musicBtn').innerText=music?'🔊':'🔇';};
</script>
</body>
</html>
